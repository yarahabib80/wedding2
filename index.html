<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mariage Georges & Yara</title>
<!-- Google Fonts: Great Vibes for names -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<style>
/* Full screen layout */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  background-color: #fff7ee; /* off-white background */
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  text-align: center;
  overflow: hidden;
}

/* Container filling most of the screen */
.container {
  height: 90vh; /* almost full height */
  width: 95%;
  display: flex;
  flex-direction: column;
  justify-content: space-around; /* evenly space content */
  align-items: center;
  padding: 5px;
}

/* Wedding names in calligraphy */
h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 10vw;
  color: #74583e; /* brownish color */
  margin: 0;
  line-height: 1;
}

/* Personalized guest message */
#message, #guest-name, #num-guests {
  font-size: 5vw;
  color: #74583e;
  margin: 5px 0;
  line-height: 1.2;
}

/* RSVP buttons */
button.confirm, button.decline {
  font-size: 4.5vw;
  padding: 12px 20px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  margin: 5px;
  width: 40%;
  max-width: 180px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: all 0.2s ease;
}

button.confirm {
  background: linear-gradient(90deg, #c8a96a, #b8860b);
  color: white;
}
button.confirm:hover { transform: scale(1.05); }

button.decline {
  background: linear-gradient(90deg, #999, #555);
  color: white;
}
button.decline:hover { transform: scale(1.05); }

/* Love message textarea */
textarea {
  width: 80%;
  max-width: 350px;
  height: 70px;
  padding: 8px;
  font-size: 4.5vw;
  border-radius: 10px;
  border: 2px solid #74583e;
  resize: none;
  margin: 10px 0;
}

/* Modern submit button */
button#submit {
  font-size: 5vw;
  padding: 12px 25px;
  border-radius: 15px;
  border: none;
  cursor: pointer;
  width: 70%;
  max-width: 300px;
  color: white;
  background: linear-gradient(90deg, #ff7eb9, #ff758c);
  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  transition: all 0.3s ease;
}
button#submit:hover {
  transform: scale(1.05);
  background: linear-gradient(90deg, #ff758c, #ff7eb9);
}

/* Responsive tweaks for mobile */
@media (max-width: 480px) {
  h1 { font-size: 12vw; }
  #message, #guest-name, #num-guests { font-size: 5.5vw; }
  button.confirm, button.decline, button#submit { font-size: 5vw; }
  textarea { font-size: 5vw; height: 60px; width: 90%; }
}
</style>
</head>
<body>

<div class="container">
  <h1>Georges & Yara</h1>
  <div id="message"></div>

  <p>Honor us with your presence</p>
  <p id="guest-name"></p>
  <p>Please reply before June 7, 2026</p>
  <p>Number of persons invited: <span id="num-guests"></span></p>

  <p>Are you attending:</p>
  <div>
    <button class="confirm" onclick="selectAttendance(true)">Yes</button>
    <button class="decline" onclick="selectAttendance(false)">No</button>
  </div>

  <p>Share your love and wishes:</p>
  <textarea id="love-message" placeholder="Write your message here..."></textarea>
  <button id="submit" onclick="submitForm()">Submit</button>
</div>

<script>
// Get URL parameters
const params = new URLSearchParams(window.location.search);
const name = params.get("name");
const guests = params.get("guests");

// Fill personalized sections
if(name && guests){
  document.getElementById("message").innerHTML = "Chère <b>" + name + "</b>,";
  document.getElementById("guest-name").innerText = name;
  document.getElementById("num-guests").innerText = guests;
}

// Track RSVP selection
let attending = null;
function selectAttendance(choice){
  attending = choice;
  if(choice){
    alert("Merci pour votre confirmation");
  } else {
    alert("Merci de nous avoir informés");
  }
}

// Submit form
function submitForm(){
  const loveMsg = document.getElementById("love-message").value;
  if(attending === null){
    alert("Please select Yes or No for attendance");
    return;
  }
  alert(
    "Submitted!\n" +
    "Attending: " + (attending ? "Yes" : "No") + "\n" +
    "Message: " + loveMsg
  );
  // Here you can later connect to Google Sheets / WhatsApp / Email
}
</script>

</body>
</html>
