<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mariage Georges & Yara</title>
<!-- Google Fonts: Great Vibes for names -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<style>
/* Full screen and center everything */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  background-color: #ffd3da; /* light pink background */
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  font-family: Arial, sans-serif; /* fallback */
  text-align: center;
  overflow: hidden;
}

/* Names at the top in calligraphy */
h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 10vw; /* responsive large font */
  color: #B76E79; /* contrast with light pink */
  margin: 0;
  line-height: 1;
}

/* Personalized message */
#message {
  font-size: 8vw; /* very big to fill screen */
  color: #B76E79;
  margin: 20px 0 0 0;
  line-height: 1.2;
}

/* Optional: responsive adjustments for small screens */
@media (max-width: 480px) {
  h1 { font-size: 12vw; }
  #message { font-size: 10vw; }
}
</style>
</head>
<body>

<h1>Georges & Yara 🤍</h1>
<div id="message"></div>

<script>
// Get URL parameters
const params = new URLSearchParams(window.location.search);
const name = params.get("name");
const guests = params.get("guests");

// Fill personalized message
if(name && guests){
  document.getElementById("message").innerHTML =
    "Chère <b>" + name + "</b>,<br>" +
    "<b>" + guests + "</b> place(s) vous sont réservées 🤍";
} else {
  document.getElementById("message").innerHTML =
    "Bienvenue sur notre page de confirmation 🤍";
}
</script>

</body>
</html>
